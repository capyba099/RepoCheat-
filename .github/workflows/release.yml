name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: csdecomp-linux-x64
            configure: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
            package: |
              cp build/csdecomp csdecomp-linux-x64
              chmod +x csdecomp-linux-x64
          - os: ubuntu-latest
            artifact: csdecomp.exe
            configure: >-
              cmake -S . -B build
              -DCMAKE_SYSTEM_NAME=Windows
              -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++
              -DCMAKE_BUILD_TYPE=Release
            package: cp build/csdecomp.exe csdecomp.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW (Windows cross-compile)
        if: matrix.artifact == 'csdecomp.exe'
        run: sudo apt-get update && sudo apt-get install -y g++-mingw-w64-x86-64

      - name: Configure
        run: ${{ matrix.configure }}

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        shell: bash
        run: ${{ matrix.package }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/csdecomp-linux-x64/csdecomp-linux-x64
            artifacts/csdecomp.exe/csdecomp.exe
          generate_release_notes: true
          body: |
            ## Windows
            Download **`csdecomp.exe`** from **Assets** below (not the Source code zip).

            The `.exe` file is uploaded by CI ~1 minute after the tag is created.
            If you only see `Source code (zip)` — refresh the page in a minute.

            ## Linux
            Download **`csdecomp-linux-x64`** from Assets.
