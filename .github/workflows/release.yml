name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - name: Create draft release (no assets yet)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: true
          prerelease: false
          generate_release_notes: true
          body: |
            Сборка идёт… Подождите ~1 минуту и обновите страницу.

            ## Windows — скачать .exe
            Файл **`csdecomp.exe`** появится в **Assets** ниже (не «Source code (zip)»).

            Прямая ссылка (после сборки):
            https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/csdecomp.exe

            ## Linux
            Файл **`csdecomp-linux-x64`** в Assets.

            ---
            Build in progress… Refresh this page in ~1 minute.

            Download **`csdecomp.exe`** from **Assets** below (not the Source code zip).

  build:
    needs: draft
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: csdecomp-linux-x64
            configure: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
            package: |
              cp build/csdecomp csdecomp-linux-x64
              chmod +x csdecomp-linux-x64
          - os: ubuntu-latest
            artifact: csdecomp.exe
            configure: >-
              cmake -S . -B build
              -DCMAKE_SYSTEM_NAME=Windows
              -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++
              -DCMAKE_BUILD_TYPE=Release
            package: cp build/csdecomp.exe csdecomp.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW (Windows cross-compile)
        if: matrix.artifact == 'csdecomp.exe'
        run: sudo apt-get update && sudo apt-get install -y g++-mingw-w64-x86-64

      - name: Configure
        run: ${{ matrix.configure }}

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        shell: bash
        run: ${{ matrix.package }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release with binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            artifacts/csdecomp-linux-x64/csdecomp-linux-x64
            artifacts/csdecomp.exe/csdecomp.exe
          body: |
            ## Скачать Windows (.exe)

            Нажмите **`csdecomp.exe`** в блоке **Assets** внизу страницы.

            **Не скачивайте** «Source code (zip)» — там нет готового `.exe`, только исходники.

            Прямая ссылка: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/csdecomp.exe

            ## Linux

            Скачайте **`csdecomp-linux-x64`** из Assets.

            Прямая ссылка: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/csdecomp-linux-x64

            ---
            ## Windows (.exe)

            Download **`csdecomp.exe`** from **Assets** below — not «Source code (zip)».

            Direct link: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/csdecomp.exe

            ## Linux

            Download **`csdecomp-linux-x64`** from Assets.
